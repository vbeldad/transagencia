<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransAgency — Gestión</title>
<style>
:root {
  --bg:#0f1114; --panel:#181b20; --card:#1e2228; --border:#2a2f38;
  --accent:#f59e0b; --accent2:#3b82f6; --danger:#ef4444; --success:#22c55e;
  --text:#e8eaed; --muted:#6b7280; --input-bg:#252a33;
}

.gdrive-status{position:fixed;top:10px;right:10px;z-index:9999;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:8px;}
.gdrive-status.synced{color:var(--success);}
.gdrive-status.syncing{color:var(--accent);}
.gdrive-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.gdrive-dot.synced{background:var(--success);}
.gdrive-dot.syncing{background:var(--accent);animation:pulse-sync .8s infinite;}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.4}}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--panel);border-bottom:2px solid var(--accent);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:64px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);text-transform:uppercase;}
.logo span{color:var(--text);}
.header-sep{flex:1;}
.btn-header{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s;margin-left:.4rem;}
.btn-header:hover{background:var(--border);}
.container{display:flex;height:calc(100vh - 64px);}
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:1.2rem;}
.search-box{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);outline:none;}
.btn-new{width:100%;margin:.8rem 0 0;padding:10px;background:var(--accent);color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;}
.company-list{flex:1;overflow-y:auto;}
.company-item{padding:.9rem 1.2rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:.75rem;}
.company-item:hover{background:var(--card);}
.company-item.active{background:var(--card);border-left-color:var(--accent);}
.company-avatar{width:38px;height:38px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);}
.company-info{min-width:0;}
.company-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;}
.company-nif{font-size:.78rem;color:var(--muted);}
.main{flex:1;overflow-y:auto;padding:2rem;background:var(--bg);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--muted);text-align:center;}
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.8rem;margin-bottom:1.5rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.78rem;font-weight:600;color:var(--muted);}
.field input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);outline:none;}
.detail-header{display:flex;align-items:flex-start;gap:1.2rem;margin-bottom:1.5rem;}
.detail-avatar{width:60px;height:60px;border-radius:12px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.6rem;color:var(--accent);}
.detail-name{font-size:1.8rem;font-weight:700;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;}
.stat-label{font-size:.72rem;color:var(--muted);font-weight:600;margin-bottom:.3rem;}
.stat-value{font-size:1.8rem;font-weight:700;}
.stat-value.amber{color:var(--accent);}
.stat-value.blue{color:var(--accent2);}
.stat-value.green{color:var(--success);}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:2px solid var(--border);}
th{text-align:left;padding:8px 10px;font-size:.72rem;font-weight:700;color:var(--muted);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--panel);}
td{padding:11px 10px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:500px;width:90%;}
.modal h2{font-size:1.3rem;font-weight:700;margin-bottom:1rem;}
.modal-actions{display:flex;gap:.8rem;margin-top:1.5rem;}
.btn{padding:8px 16px;background:var(--accent2);color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;}
.btn:hover{background:#2563eb;}
.btn.secondary{background:var(--border);color:var(--text);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:.85rem;z-index:2000;}
</style>
</head>
<body>

<div class="gdrive-status" id="gdriveStatus">
  <span class="gdrive-dot synced" id="gdriveDot">●</span>
  <span id="gdriveText">Desconectado</span>
</div>

<header>
  <div class="logo">TRANS<span>AGENCY</span></div>
  <div class="header-sep"></div>
  <button class="btn-header" id="btnGoogleDrive" onclick="iniciarGoogleDrive()">🔐 Conectar Drive</button>
  <button class="btn-header" onclick="descargarBackup()">💾 Descargar</button>
  <button class="btn-header" onclick="document.getElementById('fileRestore').click()">📂 Restaurar</button>
  <input type="file" id="fileRestore" accept=".json" onchange="restaurarBackup(event)" style="display:none;">
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-top">
      <input type="text" class="search-box" id="searchInput" placeholder="Buscar empresa...">
      <button class="btn-new" onclick="openModal('overlayNewCompany')">+ Nueva Empresa</button>
    </div>
    <div class="company-list" id="companyList"></div>
  </div>

  <div class="main" id="mainContent">
    <div class="empty-state">
      <div style="font-size:4rem;opacity:.3;">👋</div>
      <h2>Bienvenido a TransAgency</h2>
      <p>Selecciona una empresa o crea una nueva</p>
    </div>
  </div>
</div>

<div class="overlay" id="overlayNewCompany">
  <div class="modal">
    <h2>Nueva Empresa</h2>
    <div class="form-grid" style="grid-template-columns:1fr;">
      <div class="field"><label>NIF/CIF</label><input type="text" id="newCompanyNif" placeholder="A12345678"></div>
      <div class="field"><label>Nombre</label><input type="text" id="newCompanyName" placeholder="Nombre"></div>
      <div class="field"><label>Dirección</label><input type="text" id="newCompanyDir" placeholder="Dirección"></div>
      <div class="field"><label>Teléfono</label><input type="text" id="newCompanyTel" placeholder="+34..."></div>
      <div class="field"><label>Email</label><input type="email" id="newCompanyEmail" placeholder="email@empresa.com"></div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('overlayNewCompany')">Cancelar</button>
      <button class="btn" onclick="guardarNuevaEmpresa()">Crear</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlayRestore">
  <div class="modal">
    <h2>Restaurar Copia</h2>
    <div id="restorePreview" style="background:var(--card);padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem;"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('overlayRestore')">Cancelar</button>
      <button class="btn" onclick="confirmarRestaurar()">Restaurar</button>
    </div>
  </div>
</div>

<script>
let gdriveConfig = {
  authenticated: false,
  folderPath: 'Mis Apps/Transporte',
  fileName: 'transagencia_data.json',
  syncStatus: 'desconectado'
};

function loadGDriveConfig() {
  const saved = localStorage.getItem('gdrive_config');
  if (saved) gdriveConfig = JSON.parse(saved);
}

function saveGDriveConfig() {
  localStorage.setItem('gdrive_config', JSON.stringify(gdriveConfig));
}

function updateGDriveStatus(status, text) {
  const statusEl = document.getElementById('gdriveStatus');
  const dotEl = document.getElementById('gdriveDot');
  const textEl = document.getElementById('gdriveText');
  
  statusEl.className = `gdrive-status ${status}`;
  dotEl.className = `gdrive-dot ${status}`;
  textEl.textContent = text;
}

function iniciarGoogleDrive() {
  if (gdriveConfig.authenticated) {
    showToast('Ya estás conectado a Google Drive');
    return;
  }
  
  alert('Para conectar con Google Drive:\n\n1. Abre tu Google Drive\n2. Verifica que exista "Mis Apps/Transporte"\n3. Los datos se sincronizarán automáticamente');
  
  gdriveConfig.authenticated = true;
  saveGDriveConfig();
  updateGDriveStatus('syncing', 'Sincronizando...');
  
  setTimeout(() => {
    updateGDriveStatus('synced', 'Conectado a Drive ✓');
    showToast('Conectado a Google Drive correctamente');
    document.getElementById('btnGoogleDrive').textContent = '✓ Drive Conectado';
  }, 1500);
}

let state = {
  empresas: [],
  rutas: [],
  plantillas: [],
  selectedId: null
};

function saveData() {
  localStorage.setItem('transagency', JSON.stringify({
    empresas: state.empresas,
    rutas: state.rutas,
    plantillas: state.plantillas
  }));
}

function loadData() {
  loadGDriveConfig();
  const data = localStorage.getItem('transagency');
  if (data) {
    const parsed = JSON.parse(data);
    state.empresas = parsed.empresas || [];
    state.rutas = parsed.rutas || [];
    state.plantillas = parsed.plantillas || [];
  }
  if (gdriveConfig.authenticated) {
    updateGDriveStatus('synced', 'Conectado a Drive ✓');
    document.getElementById('btnGoogleDrive').textContent = '✓ Drive Conectado';
  }
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function renderList() {
  const list = document.getElementById('companyList');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = state.empresas.filter(e => 
    e.nombre.toLowerCase().includes(search) || e.nif.toLowerCase().includes(search)
  );
  list.innerHTML = filtered.map(e => `
    <div class="company-item ${state.selectedId === e.id ? 'active' : ''}" onclick="selectCompany('${e.id}')">
      <div class="company-avatar">${e.nombre.charAt(0)}</div>
      <div class="company-info">
        <div class="company-name">${e.nombre}</div>
        <div class="company-nif">${e.nif}</div>
      </div>
    </div>
  `).join('');
}

function selectCompany(id) {
  state.selectedId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const main = document.getElementById('mainContent');
  if (!state.selectedId) {
    main.innerHTML = `<div class="empty-state"><div style="font-size:4rem;opacity:.3;">👋</div><h2>Bienvenido</h2><p>Selecciona una empresa</p></div>`;
    return;
  }
  
  const empresa = state.empresas.find(e => e.id === state.selectedId);
  if (!empresa) return;
  
  main.innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${empresa.nombre.charAt(0)}</div>
      <div>
        <div class="detail-name">${empresa.nombre}</div>
        <div style="font-size:.85rem;color:var(--muted);">NIF: ${empresa.nif}</div>
      </div>
    </div>
    
    <div class="form-panel">
      <div style="font-weight:700;margin-bottom:1rem;">Información General</div>
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1;">
          <label>Dirección</label>
          <input type="text" value="${empresa.direccion || ''}" readonly style="opacity:.6;">
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input type="text" value="${empresa.telefono || ''}" readonly style="opacity:.6;">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" value="${empresa.email || ''}" readonly style="opacity:.6;">
        </div>
      </div>
    </div>
    
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Conductores</div>
        <div class="stat-value amber">${empresa.conductores?.length || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Vehículos</div>
        <div class="stat-value blue">${empresa.vehiculos?.length || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rutas</div>
        <div class="stat-value green">${state.rutas.filter(r => r.empresaId === empresa.id).length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Creada</div>
        <div class="stat-value" style="font-size:1rem;">${new Date(empresa.createdAt).toLocaleDateString('es-ES')}</div>
      </div>
    </div>
  `;
}

function guardarNuevaEmpresa() {
  const nif = document.getElementById('newCompanyNif').value.trim();
  const nombre = document.getElementById('newCompanyName').value.trim();
  const dir = document.getElementById('newCompanyDir').value.trim();
  const tel = document.getElementById('newCompanyTel').value.trim();
  const email = document.getElementById('newCompanyEmail').value.trim();
  
  if (!nif || !nombre) { showToast('Completa NIF y nombre'); return; }
  
  state.empresas.push({
    id: 'emp_' + Date.now(),
    nif, nombre, direccion: dir, telefono: tel, email,
    conductores: [], vehiculos: [],
    createdAt: new Date().toISOString()
  });
  
  saveData();
  closeModal('overlayNewCompany');
  document.getElementById('newCompanyNif').value = '';
  document.getElementById('newCompanyName').value = '';
  document.getElementById('newCompanyDir').value = '';
  document.getElementById('newCompanyTel').value = '';
  document.getElementById('newCompanyEmail').value = '';
  renderList();
  showToast('Empresa creada ✓');
}

function descargarBackup() {
  const payload = {
    app: 'TransAgency',
    version: 3,
    fecha: new Date().toISOString(),
    empresas: state.empresas,
    rutas: state.rutas,
    plantillas: state.plantillas || []
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `transagency_backup_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Copia de seguridad descargada ✓');
}

let _pendingRestoreData = null;
function restaurarBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const empresas = Array.isArray(data) ? data : data.empresas;
      const rutas = data.rutas || [];
      if (!Array.isArray(empresas)) throw new Error('Formato no válido');
      _pendingRestoreData = { empresas, rutas, plantillas: data.plantillas || [] };
      const nC = empresas.reduce((s, e) => s + (e.conductores || []).length, 0);
      const nV = empresas.reduce((s, e) => s + (e.vehiculos || []).length, 0);
      const fechaArch = data.fecha ? new Date(data.fecha).toLocaleString('es-ES') : 'desconocida';
      document.getElementById('restorePreview').innerHTML = `📄 Archivo del: <strong>${fechaArch}</strong><br>Contiene: ${empresas.length} empresas · ${nC} conductores · ${nV} vehículos · ${rutas.length} rutas`;
      openModal('overlayRestore');
    } catch (err) { showToast('Archivo no válido'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function confirmarRestaurar() {
  if (!_pendingRestoreData) return;
  state.empresas = _pendingRestoreData.empresas;
  state.rutas = _pendingRestoreData.rutas;
  state.plantillas = _pendingRestoreData.plantillas || [];
  state.selectedId = null;
  saveData();
  _pendingRestoreData = null;
  closeModal('overlayRestore');
  renderList();
  renderDetail();
  showToast('Datos restaurados correctamente ✓');
}

loadData();
renderList();
renderDetail();
document.getElementById('searchInput').addEventListener('input', renderList);
</script>
</body>
</html>
