<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TransAgency</title>
<style>
:root{--bg:#0f1114;--panel:#181b20;--card:#1e2228;--accent:#f59e0b;--accent2:#3b82f6;--text:#e8eaed;--muted:#6b7280;--input-bg:#252a33;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--panel);border-bottom:2px solid var(--accent);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:64px;}
.logo{font-size:1.6rem;font-weight:800;color:var(--accent);text-transform:uppercase;}
.logo span{color:var(--text);}
.header-sep{flex:1;}
.btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;font-weight:700;cursor:pointer;margin-left:.4rem;}
.btn:hover{background:var(--border);}
.container{display:flex;height:calc(100vh - 64px);}
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-top{padding:1.2rem;border-bottom:1px solid var(--border);}
.search-box{width:100%;padding:8px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);}
.btn-new{width:100%;margin:.8rem 0 0;padding:10px;background:var(--accent);color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;}
.company-list{flex:1;overflow-y:auto;}
.company-item{padding:.9rem 1.2rem;cursor:pointer;border-left:3px solid transparent;display:flex;gap:.75rem;}
.company-item:hover{background:var(--card);}
.company-item.active{background:var(--card);border-left-color:var(--accent);}
.company-avatar{width:38px;height:38px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);}
.main{flex:1;overflow-y:auto;padding:2rem;background:var(--bg);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--muted);}
.empty-icon{font-size:4rem;opacity:.3;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:500px;width:90%;}
.modal h2{margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:1fr;gap:1rem;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.78rem;color:var(--muted);}
.field input{padding:9px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);}
.modal-actions{display:flex;gap:.8rem;margin-top:1.5rem;}
.btn-modal{padding:8px 16px;background:var(--accent2);color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;flex:1;}
.btn-modal.secondary{background:var(--border);color:var(--text);}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;z-index:2000;}
</style>
</head>
<body>

<header>
  <div class="logo">TRANS<span>AGENCY</span></div>
  <div class="header-sep"></div>
  <button class="btn" onclick="descargarBackup()">💾 Descargar</button>
  <button class="btn" onclick="document.getElementById('fileRestore').click()">📂 Restaurar</button>
  <input type="file" id="fileRestore" accept=".json" onchange="restaurarBackup(event)" style="display:none;">
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-top">
      <input type="text" class="search-box" id="searchInput" placeholder="Buscar...">
      <button class="btn-new" onclick="openModal('overlayNewCompany')">+ Nueva Empresa</button>
    </div>
    <div class="company-list" id="companyList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-icon">👋</div>
      <h2>Bienvenido</h2>
      <p>Selecciona una empresa</p>
    </div>
  </div>
</div>

<div class="overlay" id="overlayNewCompany">
  <div class="modal">
    <h2>Nueva Empresa</h2>
    <div class="form-grid">
      <div class="field"><label>NIF</label><input type="text" id="newCompanyNif"></div>
      <div class="field"><label>Nombre</label><input type="text" id="newCompanyName"></div>
      <div class="field"><label>Dirección</label><input type="text" id="newCompanyDir"></div>
      <div class="field"><label>Teléfono</label><input type="text" id="newCompanyTel"></div>
      <div class="field"><label>Email</label><input type="email" id="newCompanyEmail"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal secondary" onclick="closeModal('overlayNewCompany')">Cancelar</button>
      <button class="btn-modal" onclick="guardarNuevaEmpresa()">Crear</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlayRestore">
  <div class="modal">
    <h2>Restaurar</h2>
    <div id="restorePreview"></div>
    <div class="modal-actions">
      <button class="btn-modal secondary" onclick="closeModal('overlayRestore')">Cancelar</button>
      <button class="btn-modal" onclick="confirmarRestaurar()">Restaurar</button>
    </div>
  </div>
</div>

<script>
let state={empresas:[],rutas:[],plantillas:[],selectedId:null};

function saveData(){localStorage.setItem('transagency',JSON.stringify({empresas:state.empresas,rutas:state.rutas,plantillas:state.plantillas}));}
function loadData(){const data=localStorage.getItem('transagency');if(data){const parsed=JSON.parse(data);state.empresas=parsed.empresas||[];state.rutas=parsed.rutas||[];state.plantillas=parsed.plantillas||[];}}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
function renderList(){const list=document.getElementById('companyList');const search=document.getElementById('searchInput').value.toLowerCase();const filtered=state.empresas.filter(e=>e.nombre.toLowerCase().includes(search)||e.nif.toLowerCase().includes(search));list.innerHTML=filtered.map(e=>`<div class="company-item ${state.selectedId===e.id?'active':''}" onclick="selectCompany('${e.id}')"><div class="company-avatar">${e.nombre.charAt(0)}</div><div>${e.nombre}</div></div>`).join('');}
function selectCompany(id){state.selectedId=id;renderList();renderDetail();}
function renderDetail(){const main=document.getElementById('mainContent');if(!state.selectedId){main.innerHTML=`<div class="empty-state"><div class="empty-icon">👋</div><h2>Bienvenido</h2><p>Selecciona empresa</p></div>`;return;}const empresa=state.empresas.find(e=>e.id===state.selectedId);if(!empresa)return;main.innerHTML=`<h2>${empresa.nombre}</h2><p>NIF: ${empresa.nif}</p><p>Dirección: ${empresa.direccion||''}</p><p>Teléfono: ${empresa.telefono||''}</p><p>Email: ${empresa.email||''}</p>`;}
function guardarNuevaEmpresa(){const nif=document.getElementById('newCompanyNif').value.trim();const nombre=document.getElementById('newCompanyName').value.trim();if(!nif||!nombre){showToast('Completa NIF y nombre');return;}state.empresas.push({id:'emp_'+Date.now(),nif,nombre,direccion:document.getElementById('newCompanyDir').value.trim(),telefono:document.getElementById('newCompanyTel').value.trim(),email:document.getElementById('newCompanyEmail').value.trim(),conductores:[],vehiculos:[],createdAt:new Date().toISOString()});saveData();closeModal('overlayNewCompany');document.getElementById('newCompanyNif').value='';document.getElementById('newCompanyName').value='';document.getElementById('newCompanyDir').value='';document.getElementById('newCompanyTel').value='';document.getElementById('newCompanyEmail').value='';renderList();showToast('Empresa creada ✓');}
function descargarBackup(){const payload={app:'TransAgency',version:3,fecha:new Date().toISOString(),empresas:state.empresas,rutas:state.rutas,plantillas:state.plantillas||[]};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`transagency_backup_${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('Descargado ✓');}
let _pendingRestoreData=null;
function restaurarBackup(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);const empresas=Array.isArray(data)?data:data.empresas;if(!Array.isArray(empresas))throw new Error('no');_pendingRestoreData={empresas,rutas:data.rutas||[],plantillas:data.plantillas||[]};const nC=empresas.reduce((s,e)=>s+(e.conductores||[]).length,0);const nV=empresas.reduce((s,e)=>s+(e.vehiculos||[]).length,0);const fechaArch=data.fecha?new Date(data.fecha).toLocaleString('es-ES'):'desconocida';document.getElementById('restorePreview').innerHTML=`📄 ${fechaArch}<br>${empresas.length} empresas · ${nC} conductores · ${nV} vehículos`;openModal('overlayRestore');}catch(err){showToast('Archivo inválido');}event.target.value='';};reader.readAsText(file);}
function confirmarRestaurar(){if(!_pendingRestoreData)return;state.empresas=_pendingRestoreData.empresas;state.rutas=_pendingRestoreData.rutas;state.plantillas=_pendingRestoreData.plantillas;state.selectedId=null;saveData();_pendingRestoreData=null;closeModal('overlayRestore');renderList();renderDetail();showToast('Restaurado ✓');}
loadData();renderList();renderDetail();document.getElementById('searchInput').addEventListener('input', renderList);
</script>
</body>
</html>
